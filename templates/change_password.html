{% extends "base.html" %}
{% block title %}Ubah Password{% endblock %}
{% block page_title %}Ubah Password{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h3 style="margin-bottom: 20px; color: var(--primary-color);">
        <i class="fas fa-key"></i> Ubah Password Akun
    </h3>
    
    <form id="changePasswordForm" onsubmit="handleChangePassword(event)">
        <div class="form-group">
            <label for="old_password">Password Lama</label>
            <input type="password" id="old_password" name="old_password" class="form-control" required placeholder="Masukkan password lama...">
        </div>
        
        <div class="form-group">
            <label for="new_password">Password Baru <span style="color: #888;">(min. 8 karakter)</span></label>
            <input type="password" id="new_password" name="new_password" class="form-control" required placeholder="Masukkan password baru...">
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Konfirmasi Password Baru</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="Masukkan kembali password baru...">
        </div>
        
        <div id="passwordMsg" style="margin-bottom: 15px; display: none;"></div>
        
        <button type="submit" class="btn btn-primary" id="btnChangePassword" style="width: 100%;">
            <i class="fas fa-save"></i> Ubah Password
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function handleChangePassword(e) {
        e.preventDefault();
        const btn = document.getElementById('btnChangePassword');
        const msg = document.getElementById('passwordMsg');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
        msg.style.display = 'none';
        
        const data = {
            old_password: document.getElementById('old_password').value,
            new_password: document.getElementById('new_password').value,
            confirm_password: document.getElementById('confirm_password').value
        };
        
        try {
            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (result.success) {
                msg.style.display = 'block';
                msg.innerHTML = '<span style="color: #15803d; font-weight: 500;"><i class="fas fa-check-circle"></i> ' + result.message + '</span>';
                
                document.getElementById('changePasswordForm').reset();
                
                setTimeout(() => {
                    logout();
                }, 2000);
            } else {
                msg.style.display = 'block';
                msg.innerHTML = '<span style="color: #dc2626; font-weight: 500;"><i class="fas fa-exclamation-circle"></i> ' + result.message + '</span>';
            }
        } catch (err) {
            msg.style.display = 'block';
            msg.innerHTML = '<span style="color: #dc2626; font-weight: 500;"><i class="fas fa-exclamation-circle"></i> Terjadi kesalahan jaringan</span>';
        }
        
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Ubah Password';
    }
</script>
{% endblock %}
